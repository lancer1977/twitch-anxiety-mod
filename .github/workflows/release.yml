name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate manifest JSON
        run: node -e "const fs = require('fs'); JSON.parse(fs.readFileSync('manifest.json', 'utf8'));"

      - name: Syntax-check browser scripts
        run: |
          node --check content.js
          node --check popup.js

      - name: Build release zip
        run: bash scripts/build-zip.sh

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: twitch-anxiety-mod-release-zip
          path: dist/twitch-anxiety-mod.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/twitch-anxiety-mod.zip
          generate_release_notes: true
