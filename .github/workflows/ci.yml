name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate manifest JSON
        run: node -e "const fs = require('fs'); JSON.parse(fs.readFileSync('manifest.json', 'utf8'));"

      - name: Syntax-check browser scripts
        run: |
          node --check content.js
          node --check popup.js

      - name: Build release zip
        run: bash scripts/build-zip.sh

      - name: Inspect zip archive
        run: unzip -t dist/twitch-anxiety-mod.zip

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: twitch-anxiety-mod-zip
          path: dist/twitch-anxiety-mod.zip

