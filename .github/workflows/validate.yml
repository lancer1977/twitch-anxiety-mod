name: Validate

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm test

      - name: Build extension bundle
        run: npm run smoke

      - name: Upload extension bundle
        uses: actions/upload-artifact@v4
        with:
          name: twitch-anxiety-mod
          path: dist/twitch-anxiety-mod.zip
          if-no-files-found: error
