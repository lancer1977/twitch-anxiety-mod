<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Twitch Anxiety Mod</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Twitch Anxiety Mod</h1>
    <label><input type="checkbox" id="enabled" /> Enable extension</label>
    <label><input type="checkbox" id="hideViewers" /> Hide viewer counts</label>
    <label><input type="checkbox" id="hideFollowers" /> Hide follower counts</label>
    <label><input type="checkbox" id="hideWatchingNow" /> Hide “watching now”</label>
    <label><input type="checkbox" id="strictMode" /> Strict mode (hide numeric badges)</label>
    <p class="hint">Refresh Twitch tabs after changing settings.</p>
    <script src="popup.js"></script>
  </body>
</html>
